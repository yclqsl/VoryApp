<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <title>VoryApp Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 0%, rgba(124, 58, 237, 0.28), transparent 35%),
          radial-gradient(circle at 90% 10%, rgba(217, 70, 239, 0.18), transparent 35%),
          #080711;
        color: white;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      .card {
        width: min(100%, 440px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 32px;
        background: rgba(255,255,255,0.06);
        padding: 28px;
        text-align: center;
        box-shadow: 0 24px 100px rgba(0,0,0,0.42);
        backdrop-filter: blur(24px);
      }

      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: rgba(124,58,237,0.28);
        font-size: 30px;
        font-weight: 900;
        box-shadow: 0 0 32px rgba(124,58,237,0.35);
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: rgba(255,255,255,0.55);
        line-height: 1.65;
      }

      button {
        margin-top: 16px;
        border: 0;
        border-radius: 18px;
        background: white;
        color: black;
        padding: 14px 18px;
        font-weight: 900;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo">V</div>
      <h1>VoryApp offline</h1>
      <p>
        İnternet bağlantısı yok gibi görünüyor. Bağlantı geri gelince odaya
        tekrar bağlanabilirsin.
      </p>
      <button onclick="window.location.reload()">Tekrar Dene</button>
    </main>
  </body>
</html>
